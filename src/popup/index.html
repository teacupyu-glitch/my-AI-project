<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI翻译助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <div class="popup-header">
      <div class="logo">
        <span class="logo-icon">🌐</span>
        <span class="logo-text">AI翻译助手</span>
      </div>
    </div>

    <!-- 状态显示 -->
    <div class="popup-status" id="statusDisplay">
      <div class="status-icon">✓</div>
      <div class="status-text">准备就绪</div>
    </div>

    <!-- 翻译按钮 -->
    <div class="popup-actions">
      <button id="translateBtn" class="btn btn-primary">
        <span class="btn-icon">🔄</span>
        <span class="btn-text">翻译当前页面</span>
      </button>
    </div>

    <!-- 快速设置 -->
    <div class="popup-settings">
      <div class="setting-item">
        <label class="setting-label">目标语言</label>
        <select id="targetLangSelect" class="setting-select">
          <option value="zh-CN">中文（简体）</option>
          <option value="zh-TW">中文（繁体）</option>
          <option value="en">英文</option>
          <option value="ja">日文</option>
          <option value="ko">韩文</option>
          <option value="fr">法文</option>
          <option value="de">德文</option>
          <option value="es">西班牙文</option>
          <option value="ru">俄文</option>
        </select>
      </div>
    </div>

    <!-- API配置状态 -->
    <div class="api-status" id="apiStatus">
      <div class="api-status-icon">⚠️</div>
      <div class="api-status-text">请先配置API密钥</div>
    </div>

    <!-- 底部链接 -->
    <div class="popup-footer">
      <a id="settingsLink" class="footer-link">⚙️ 设置</a>
    </div>
  </div>

  <script type="module" src="../popup.js"></script>
</body>
</html>
